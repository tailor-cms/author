packages:
  - 'apps/*'
  - 'packages/*'
  - 'packages/core-extensions/meta-inputs/*'
  - 'packages/core-extensions/content-containers/*'
  - 'packages/core-extensions/content-elements/*'
  - 'packages/core-extensions/plugins/*'
  - 'tests'
  - 'extensions/content-elements'
  - 'extensions/meta-inputs'
  - 'extensions/content-containers'
  - 'extensions/plugins'
  - 'infrastructure'
  - 'config'
# pnpm 11 made `pnpm deploy` refuse non-injected workspaces by default
# (ERR_PNPM_DEPLOY_NONINJECTED_WORKSPACE). Our Dockerfile runs
# `pnpm --filter=tailor-server --prod deploy /pruned-backend` over a
# workspace whose deps are symlinked, so we opt into the legacy behaviour
# here. Long term we could enable `injectWorkspacePackages: true` and
# verify every workspace dep is injectable, but that's a separate audit.
forceLegacyDeploy: true
# Bypass pnpm 11's (24h) minimum release-age supply-chain check
# for packages we trust by name (no version pin) or for specific fresh
# patches we've already audited (version-pinned). Version-pinned entries
# age out naturally; once an entry is >24h old, the global default
# permits it without needing this list.
# Add an entry when an install fails with `ERR_PNPM_PACKAGE_TOO_FRESH`
# and the package is from a trusted upstream we've reviewed.
minimumReleaseAgeExclude:
  # PostgreSQL driver stack (pulled in by `pg` / Sequelize); upstream
  # often ships patch releases together for the whole family.
  - date-fns
  - pg
  - pg-cloudflare
  - pg-connection-string
  - pg-cursor
  - pg-pool
  - pg-protocol
  - pg-query-stream
  # Our own org's content-element packages; trusted by name so new
  # versions don't need a fresh version-pin on every release.
  - '@tailor-cms/*'
# Allowlist of packages whose postinstall / build scripts pnpm 11 may run.
# pnpm 11 blocks build scripts by default (supply-chain defense); each
# entry below opts a specific package back in because we need its
# native binary, downloaded asset, or generated artifact at install
# time. Add an entry only after auditing what the script does.
allowBuilds:
  # Native libuv file watcher used by Nuxt/Vite hot reload pipeline.
  '@parcel/watcher': true
  # Headless browser bundle for Percy visual snapshot CLI.
  '@percy/core': true
  # Pulumi resource provider plugin downloads (required for `pulumi up`).
  '@pulumi/docker': true
  '@pulumi/docker-build': true
  '@upstash/pulumi': true
  # Postinstall sponsorship notice; harmless to allow.
  aws-sdk: true
  # Platform-specific esbuild binary download (required for builds).
  esbuild: true
  # Optional type generation for protobufjs.
  protobufjs: true
  # Native bindings build for unrs-resolver (used by Nuxt resolution).
  unrs-resolver: true

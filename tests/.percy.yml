version: 2
snapshot:
  widths:
    - 1400
  minHeight: 1200
  percyCSS: "[data-percy=hide] { visibility: hidden; }"
  disableShadowDOM: false
  enable-javascript: false
discovery:
  # Percy's render-side trust treats auto-validated hosts differently from
  # explicitly allowed ones, so `localhost` must be listed even though the
  # CLI's auto-validator also picks it up.
  allowedHostnames:
    - localhost
  disallowedHostnames: []
  networkIdleTimeout: 500
upload:
  files: "**/*.{png,jpg,jpeg}"
  ignore: ""
  stripExtensions: false

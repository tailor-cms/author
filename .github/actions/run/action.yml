name: Setup Tailor for E2E testing
description: Install deps, configure env, and start the app for E2E testing
inputs:
  skip-build:
    description: 'Skip the build step (use when build artifacts are pre-built)'
    required: false
    default: 'false'
  skip-services:
    description: 'Skip starting docker-compose services (use when provided externally)'
    required: false
    default: 'false'
runs:
  using: composite
  steps:
  - uses: pnpm/action-setup@v4
  - uses: actions/setup-node@v4
    with:
      node-version-file: '.node-version'
      cache: 'pnpm'
      cache-dependency-path: './pnpm-lock.yaml'
  - name: Install dependencies
    shell: bash
    run: pnpm i --frozen-lockfile --prefer-offline
  - uses: actions/cache@v4
    name: Check Playwright cache
    id: playwright-cache
    with:
      path: ~/.cache/ms-playwright
      key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}
  - name: Install Playwright
    shell: bash
    run: pnpm dlx playwright@${{ env.PLAYWRIGHT_VERSION }} install chromium --with-deps
    if: steps.playwright-cache.outputs.cache-hit != 'true'
  - name: Run service deps via Docker
    if: inputs.skip-services != 'true'
    uses: hoverkraft-tech/compose-action@v2.0.1
    with:
      compose-file: docker-compose.dev.yaml
  - name: Update .env.dev config
    shell: bash
    run: echo "REVERSE_PROXY_PORT=3000" >> .env.dev
  - name: Configure environment
    shell: bash
    run: |
      SETUP_FLAGS="--ci"
      if [ "${{ inputs.skip-build }}" = "true" ]; then
        SETUP_FLAGS="$SETUP_FLAGS --skip-build"
      fi
      node ./scripts/setup/index.js $SETUP_FLAGS
  - name: Migrate DB
    shell: bash
    run: pnpm db:migrate
  - name: Seed DB
    shell: bash
    run: pnpm seed
  - name: Start application
    shell: bash
    run: |
      pnpm start &
      echo "Waiting for application to be ready..."
      timeout 60 bash -c 'until curl -sf http://localhost:3000/api/healthcheck > /dev/null 2>&1; do sleep 2; done'
      echo "Application is ready!"
